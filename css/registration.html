<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Etkinlik Kayıt - Etkinlik Yönetim Sistemi</title>
    <link rel="stylesheet" href="style.css">
    <link rel="icon" type="image/x-icon" href="favicon.ico">
</head>
<body>
    <header>
        <h1>Etkinlik Yönetim Sistemi</h1>
        <nav>
            <ul>
                <li><a href="index.html">Ana Sayfa</a></li>
                <li><a href="events.html">Etkinlikler</a></li>
                <li><a href="registration.html">Kayıt</a></li>
                <li><a href="contact.html">İletişim</a></li>
            </ul>
        </nav>
    </header>

    <main>
        <h2>Etkinlik Kayıt Formu</h2>
        <form action="kayit.php" method="post">
            <fieldset>
                <legend>Kişisel Bilgiler</legend>
                
                <label for="ad">Ad:</label>
                <input type="text" id="ad" name="ad" required><br><br>
                
                <label for="soyad">Soyad:</label>
                <input type="text" id="soyad" name="soyad" required><br><br>
                
                <label for="email">E-posta:</label>
                <input type="email" id="email" name="email" required><br><br>
                
                <label for="telefon">Telefon:</label>
                <input type="tel" id="telefon" name="telefon" pattern="[0-9]{10}" placeholder="5xxxxxxxxx"><br><br>
            </fieldset>

            <fieldset>
                <legend>Etkinlik Seçimi</legend>
                
                <label for="etkinlik">Etkinlik:</label>
                <select id="etkinlik" name="etkinlik" required>
                    <option value="">Seçiniz</option>
                    <option value="tech_konferansi">Tech Konferansı 2024</option>
                    <option value="ai_summit">Yapay Zeka Zirvesi</option>
                    <option value="web_dev">Web Geliştirme Workshop</option>
                </select><br><br>
                
                <label>Katılım Günleri:</label><br>
                <input type="checkbox" id="gun1" name="gun[]" value="1">
                <label for="gun1">1. Gün</label><br>
                <input type="checkbox" id="gun2" name="gun[]" value="2">
                <label for="gun2">2. Gün</label><br>
                <input type="checkbox" id="gun3" name="gun[]" value="3">
                <label for="gun3">3. Gün</label><br><br>
            </fieldset>

            <fieldset>
                <legend>Ek Bilgiler</legend>
                
                <label for="notlar">Özel İstekler:</label><br>
                <textarea id="notlar" name="notlar" rows="4" cols="50"></textarea><br><br>
                
                <label for="dosya">CV Yükle (opsiyonel):</label>
                <input type="file" id="dosya" name="dosya"><br><br>
            </fieldset>

            <input type="hidden" name="form_id" value="etkinlik_kayit_2024">
            
            <input type="submit" value="Kayıt Ol">
            <input type="reset" value="Formu Temizle">
        </form>
    </main>

    <footer>
        <p>&copy; 2024 Etkinlik Yönetim Sistemi. Tüm hakları saklıdır.</p>
    </footer>
</body>
</html>
